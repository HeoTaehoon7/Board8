spring.application.name=Board3

# Web page Setting :  Board -> /
server.servlet.context-path=/

# server мқҳ port лІҲнҳё
server.port = 9090

# jsp к°Җ м ҖмһҘлҗ  нҸҙлҚ”мқҙлҰ„  "/src/main/webapp/WEB-INF/views/" + "home" + ".jsp"
spring.mvc.view.prefix = /WEB-INF/views/
spring.mvc.view.suffix = .jsp

# JSP мҲҳм •мӢң м„ңлІ„ мһ¬мӢңмһ‘м—Ҷмқҙ л°”лЎң м Ғмҡ©н•  мҲҳ мһҲкІҢ м„Өм •
server.servlet.jsp.init-parameters.development = true

# mapper.xml кІҪлЎң м„Өм •
mybatis.mapper-locations:classpath:mapper/**/*Mapper.xml

# datasource м„Өм 
# @slf4j setting•
spring.datasource.driver-class-name=net.sf.log4jdbc.sql.jdbcapi.DriverSpy
spring.datasource.url=jdbc:log4jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=spring
spring.datasource.password=1234

# normal setting
#spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
#spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
#spring.datasource.username=spring
#spring.datasource.password=1234 

# file upload setting - no need library
spring.servlet.multipart.enabled=true
spring.servlet.multipart.location=D:/data/
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=1000MB
part4.upload-path=D:/data/




